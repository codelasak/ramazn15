name: Deploy notification

on:
  push:
    branches: [main]

# Bilgi notu: bu repo artik Hayati uzerindeki webhook listener
# (https://deploy.fennaver.tech) ile deploy edilir. GitHub Actions
# uzerinden SSH-via-cloudflared deploy'u kullanmiyoruz cunku Cloudflare
# tarafindaki Bot Fight Mode "websocket: bad handshake" hatasi veriyor.
#
# Akis:
#   GitHub push (main)
#     -> GitHub Webhook POST https://deploy.fennaver.tech (ID 611092806)
#       -> Cloudflare Tunnel -> Hayati :9500 (deploy-webhook.py)
#         -> git pull + npm install + npm run build + systemctl restart
#         -> health check -> Telegram bildirim
#
# Webhook secret + log: ~/HAYATI-SERVER.md icinde.

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "Deploy is handled by Hayati webhook listener on https://deploy.fennaver.tech"
          echo "Check log: ssh hayati-ts 'tail -f /var/log/deploy-webhook.log'"
